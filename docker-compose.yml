services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: moderation-flow-postgres
    environment:
      POSTGRES_DB: moderation_flow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - moderation_flow_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: moderation-flow-backend
    command: sh scripts/start_api.sh
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/migrations:/app/migrations
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/moderation_flow
      - OPENAI_API_KEY=
      - JWT_SECRET_KEY=change-me-local
      - FRONTEND_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - COOKIE_SECURE=false
      - COOKIE_SAMESITE=lax
      - COOKIE_DOMAIN=
      - ADMIN_SEED_EMAIL=admin@example.com
      - ADMIN_SEED_PASSWORD=admin123
      - ADMIN_SEED_NAME=Local Admin
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: moderation-flow-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --include=dev && npm run dev"
    environment:
      - NODE_ENV=development
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  moderation_flow_postgres_data:
