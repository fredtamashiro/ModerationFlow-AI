services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: moderation-flow-postgres
    environment:
      POSTGRES_DB: moderation_flow
      POSTGRES_USER: moderation_flow
      POSTGRES_PASSWORD: moderation_flow
    ports:
      - "5432:5432"
    volumes:
      - moderation_flow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: moderation-flow-redis
    ports:
      - "6380:6379"
    volumes:
      - moderation_flow_redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: moderation-flow-backend
    command: sh scripts/start_api.sh
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/migrations:/app/migrations
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://moderation_flow:moderation_flow@postgres:5432/moderation_flow
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: moderation-flow-frontend
    ports:
      - "2000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  moderation_flow_postgres_data:
  moderation_flow_redis_data:
