name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: ci
      DEMO_MODE: "false"
      LANGSMITH_TRACING: "false"
      OPENAI_API_KEY: ""
      LANGSMITH_API_KEY: ""
      DATABASE_URL: ""
      JWT_SECRET_KEY: ci-only-not-a-secret
      FRONTEND_ORIGINS: http://localhost:3003

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_ENV: ci
          NEXT_PUBLIC_DEMO_MODE: "false"
          NEXT_PUBLIC_APP_PUBLIC_URL: https://example-frontend.invalid
          NEXT_PUBLIC_API_URL: https://example-backend.invalid
          INTERNAL_API_URL: https://example-backend.invalid
        run: npm run build
